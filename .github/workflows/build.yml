name: "C++ CI build"
run-name: ${{ github.actor }} executed build ${{ inputs.testname }}

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      testname:
        default: "manually"
        description: "build title"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: submodules
      run: git submodule update --init --recursive --remote
    - name: install dependencies
      run: |
        sudo apt-get update
        sudo apt-get -y install libcurl4-openssl-dev libssl-dev
    - name: make (dynamic, the default)
      run: make
    - name: make (static link mode)
      # Exercise the other link mode too: SPEEDTEST_LINK_SHARED=no links the
      # examples against libspeedtestcpp.a instead of the shared object.
      run: make clean && make SPEEDTEST_LINK_SHARED=no
